services:
  ocpp-server:
    ports:
      - "9000:9000"
    environment:
      - DB_NAME=ocpp
      - DB_USER=ocpp
      - DB_PASSWORD=ocpp
    networks:
      - dokploy-network

  ocpp-api:
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=ocpp
      - DB_USER=ocpp
      - DB_PASSWORD=ocpp
    networks:
      - dokploy-network

  postgres:
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: false
