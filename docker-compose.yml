services:
  ocpp-server:
    build: ./backend
    env_file: .env
    environment:
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network
    restart: unless-stopped

  ocpp-api:
    build: ./api
    env_file: .env
    environment:
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - DEFAULT_LOCALE=${DEFAULT_LOCALE:-de}
    depends_on:
      - ocpp-api
    networks:
      - dokploy-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ocpp
      POSTGRES_USER: ocpp
      POSTGRES_PASSWORD: ocpp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocpp -d ocpp"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  dokploy-network:
    external: true
