services:
  ocpp-server:
    build: .
    container_name: ocpp-server
    ports:
      - "9000:9000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ocpp
      - DB_USER=ocpp
      - DB_PASSWORD=ocpp
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ocpp-api:
    build: .
    container_name: ocpp-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ocpp
      - DB_USER=ocpp
      - DB_PASSWORD=ocpp
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ocpp-postgres
    environment:
      POSTGRES_DB: ocpp
      POSTGRES_USER: ocpp
      POSTGRES_PASSWORD: ocpp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocpp -d ocpp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
