services:
  ocpp-server:
    build: ./backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ocpp
      - DB_USER=ocpp
      - DB_PASSWORD=ocpp
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network
    restart: unless-stopped

  ocpp-api:
    build: ./backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ocpp
      - DB_USER=ocpp
      - DB_PASSWORD=ocpp
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - ocpp-api
    networks:
      - dokploy-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ocpp
      POSTGRES_USER: ocpp
      POSTGRES_PASSWORD: ocpp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocpp -d ocpp"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  dokploy-network:
    external: true
