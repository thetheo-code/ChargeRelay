services:
  ocpp-server:
    build: ./backend
    env_file: .env
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    networks:
      - chargerelay
    restart: unless-stopped

  ocpp-api:
    build: ./api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    networks:
      - chargerelay
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - DEFAULT_LOCALE=${DEFAULT_LOCALE:-de}
    ports:
      - "3000:3000"
    depends_on:
      - ocpp-api
    networks:
      - chargerelay
    restart: unless-stopped

  # Built-in Postgres – only starts when COMPOSE_PROFILES=local-db is set.
  # For an external database, leave COMPOSE_PROFILES empty and set DB_HOST
  # to your external server in .env.
  postgres:
    profiles:
      - local-db
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-ocpp}
      POSTGRES_USER: ${DB_USER:-ocpp}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ocpp} -d ${DB_NAME:-ocpp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - chargerelay
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  chargerelay:
    driver: bridge
